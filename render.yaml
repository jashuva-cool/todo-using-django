services:
  - type: web
    name: taskflow
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn taskflow.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: todo-app-was7.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://todo-app-was7.onrender.com
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
