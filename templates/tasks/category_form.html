{% extends "base.html" %}
{% block title %}{{ title }} | TaskFlow{% endblock %}
{% block content %}
<div class="glass-card p-4">
  <h1 class="h3 fw-bold mb-3">{{ title }}</h1>
  <form method="post">{% csrf_token %}
    {% include "_form.html" %}
    <button class="btn btn-primary">Save Category</button>
    <a class="btn btn-outline-secondary" href="{% url 'category_list' %}">Cancel</a>
  </form>
</div>
{% endblock %}
