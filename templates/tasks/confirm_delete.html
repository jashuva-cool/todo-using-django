{% extends "base.html" %}
{% block title %}Delete {{ type }} | TaskFlow{% endblock %}
{% block content %}
<div class="glass-card p-4">
  <h1 class="h3 fw-bold">Delete {{ type }}</h1>
  <p>Are you sure you want to delete <strong>{{ object }}</strong>?</p>
  <form method="post">{% csrf_token %}
    <button class="btn btn-danger">Delete</button>
    <a class="btn btn-outline-secondary" href="{% if type == 'category' %}{% url 'category_list' %}{% else %}{% url 'task_list' %}{% endif %}">Cancel</a>
  </form>
</div>
{% endblock %}
