{% extends "base.html" %}
{% block title %}Edit Profile | TaskFlow{% endblock %}
{% block content %}
<div class="glass-card p-4">
  <h1 class="h3 fw-bold mb-3">Edit Profile</h1>
  <form method="post" enctype="multipart/form-data">{% csrf_token %}
    <div class="row g-3">
      <div class="col-md-6">{% include "_form.html" with form=user_form %}</div>
      <div class="col-md-6">{% include "_form.html" with form=profile_form %}</div>
    </div>
    <button class="btn btn-primary">Save changes</button>
  </form>
</div>
{% endblock %}
