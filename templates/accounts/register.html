{% extends "base.html" %}
{% block title %}Register | TaskFlow{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="glass-card auth-card">
    <h1 class="h3 fw-bold">Create your TaskFlow account</h1>
    <p class="text-muted">Plan, prioritize, and finish with less friction.</p>
    <form method="post">{% csrf_token %}
      {% include "_form.html" %}
      <button class="btn btn-primary w-100" type="submit">Register</button>
    </form>
  </div>
</div>
{% endblock %}
